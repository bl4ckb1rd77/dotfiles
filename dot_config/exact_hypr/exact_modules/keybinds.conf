##################
#
# Definition Vars
#
##################

$mainMod = $SUPER

$hyprpath = "$HOME/.config/hypr"
$scriptpath = "$hyprpath/scripts"
$player = "spotify"
$terminal = "kitty"
$filemanager = "caja"
$ipc = qs -c noctalia-shell ipc call

# 1. System

bind = $mainMod, q, killactive, #"Kill Aktive Window"
bind = $mainMod, f, togglefloating, #"Toggle Floating"
bind = $mainMod, J, togglesplit, #"Toggle Split"
bind = $mainMod, w, exec, $ipc wallpaper toggle #"Wallpaper Switcher"
bind = $mainMod, l, exec, $ipc lockScreen lock #"Lock Screen"
bindl=,switch:off:Lid Switch, exec, $ipc lockScreen lock
bind = $mainMod, v, exec, $ipc launcher clipboard #"Clipboard History"
bind = $mainMod, s, exec, hyprshot --freeze -m output #"Screenshot Full"
bind = $mainMod SHIFT, s, exec, hyprshot --freeze -m window #"Screenshot Window"
bind = $mainMod CTRL, s, exec, hyprshot --freeze -m region #"Screenshot Region"
bind = $mainMod, p, exec, $ipc sessionMenu toggle #"Power Menu"
bind = $mainMod, h, exec, $ipc plugin:keybind-cheatsheet toggle #"Show Cheat Sheet"
bind = $mainMod, i, exec, $terminal --title="sysinfo" -e ~/.config/hypr/scripts/sysinfo #"Sysinfo"
bind = $mainMod, r, exec, $ipc launcher toggle #"App Menu"
bind = $mainMod, x, exec, $ipc settings toggle #"Settings"
bind = $mainMod, c, exec, hyprcalculator #"Hypr Calculator"
bind = $mainMod, o, exec, hyprctl setprop active opaque toggle #"Toggle Opaque"

# 2. Application

bind = $mainMod, return, exec, $terminal #"Terminal"
bind = $mainMod SHIFT, return, exec, $terminal --title="floatkitty" #"Floating Terminal"
bind = ALT, e, exec, $filemanager #"File Manager"
bind = ALT, m, exec, $player #"Spotify"
bind = ALT, b, exec, brave #"Brave Browser"
bind = $mainMod, n, exec, $terminal -e nvim #"NeoVIM"
bind = $mainMod, d, exec, vesktop #"Discord"

# 3. Media Player

bind = $mainMod CTRL, up, exec, $scriptpath/mpdvolume up $player #"Player Volume Up"
bind = $mainMod CTRL, down, exec, $scriptpath/mpdvolume down $player #"Player Volume Down"
bind = $mainMod CTRL, left, exec, playerctl -p $player previous #"Previous Track"
bind = $mainMod CTRL, right, exec, playerctl -p $player next #"Next Track"
bind = $mainMod CTRL, return, exec, playerctl -p $player play-pause #"Play Pause"

# 3. Windows

bind = $mainMod ALT, left, movefocus, l #"move focus left"
bind = $mainMod ALT, right, movefocus, r #"move focus right"
bind = $mainMod ALT, up, movefocus, u #"move focus up"
bind = $mainMod ALT, down, movefocus, d #"move focus down"

bind = $mainMod, F11, fullscreen #"Toggle Fullscreen"
bind = $mainMod, y, pin, active #"Pin Active Window"

bind = $mainMod SHIFT, left, movewindow, l #"move window left"
bind = $mainMod SHIFT, right, movewindow, r #"move window right"
bind = $mainMod SHIFT, up, movewindow, u #"move window up"
bind = $mainMod SHIFT, down, movewindow, d #"move window down"

bind = ALT, l, resizeactive, 30 0 #"increase window width by 30"
bind = ALT, h, resizeactive, -30 0 #"decrease window width by 30"
bind = ALT, j, resizeactive, 0 -30 #"decrease window high by 30"
bind = ALT, k, resizeactive, 0 30 #"increase window high by 30"

bindm = $mainMod, mouse:272, movewindow #"move window leftclick"
bindm = $mainMod, mouse:273, resizewindow #"resize window rightclick"

# 5. Workspaces

bind = $mainMod, 1, workspace, 1 #"switch to workspace 1"
bind = $mainMod, 2, workspace, 2 #"switch to workspace 2"
bind = $mainMod, 3, workspace, 3 #"switch to workspace 3"
bind = $mainMod, 4, workspace, 4 #"switch to workspace 4"
bind = $mainMod, 5, workspace, 5 #"switch to workspace 5"
bind = $mainMod, 6, workspace, 6 #"switch to workspace 6"
bind = $mainMod, 7, workspace, 7 #"switch to workspace 7"
bind = $mainMod, 8, workspace, 8 #"switch to workspace 8"
bind = $mainMod, 9, workspace, 9 #"switch to workspace 9"

bind = ALT, 1, movetoworkspace, 1 #"move window to workspace 1"
bind = ALT, 2, movetoworkspace, 2 #"move window to workspace 2"
bind = ALT, 3, movetoworkspace, 3 #"move window to workspace 3"
bind = ALT, 4, movetoworkspace, 4 #"move window to workspace 4"
bind = ALT, 5, movetoworkspace, 5 #"move window to workspace 5"
bind = ALT, 6, movetoworkspace, 6 #"move window to workspace 6"
bind = ALT, 7, movetoworkspace, 7 #"move window to workspace 7"
bind = ALT, 8, movetoworkspace, 8 #"move window to workspace 8"
bind = ALT, 9, movetoworkspace, 9 #"move window to workspace 9"

bind = $mainMod, left, workspace, r-1 #"scroll workspaces backward"
bind = $mainMod, right, workspace, r+1 #"scroll workspaces forward"
bind = $mainMod, mouse_down, workspace, r+1 #"scroll workspaces forward"
bind = $mainMod, mouse_up, workspace, r-1 #"scroll workspaces backward"

# 6. Asus TUF Special Keys

bind = , XF86AudioRaiseVolume, exec, $ipc volume increase #"Volume Up"
bind = , XF86AudioLowerVolume, exec, $ipc volume decrease #"Volume Down"
bind = , XF86AudioMicMute, exec, $ipc volume muteInput #"Toggle Mic Mute"
bind = , XF86AudioMute, exec, $ipc volume muteOutput #"Toggle Mute"
bind = , XF86MonBrightnessDown, exec, $ipc brightness decrease #"Brightness Down"
bind = , XF86MonBrightnessUp, exec, $ipc brightness increase #"Brightness Up"
bind = , XF86TouchpadToggle, exec, $scriptpath/touchpad #"Toggle Touchpad"

